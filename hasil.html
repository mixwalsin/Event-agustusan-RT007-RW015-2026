<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Event - Event Agustusan 2026</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>🏆 Hasil Event</h1>
            </div>
            <a href="index.html" class="btn btn-secondary">← Kembali ke Beranda</a>
        </div>
    </nav>

    <div class="container hasil-container">
        <!-- FILTER CABOR -->
        <section class="filter-section">
            <label for="filterCabor">Filter Cabor:</label>
            <select id="filterCabor" onchange="filterByCabor()">
                <option value="">-- Semua Cabor --</option>
            </select>
        </section>

        <!-- LEADERBOARD LENGKAP -->
        <section class="leaderboard-full">
            <h2>Leaderboard Lengkap</h2>
            <div class="leaderboard-table-container">
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Peringkat</th>
                            <th>Nama Peserta</th>
                            <th>Cabor</th>
                            <th>Kelompok</th>
                            <th>Total Skor</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardTable">
                        <!-- Di-generate dari data.js -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- JUARA PER CABOR -->
        <section class="juara-section">
            <h2>🥇 Juara Per Cabor</h2>
            <div class="juara-grid" id="juaraGrid">
                <!-- Di-generate dari data.js -->
            </div>
        </section>

        <!-- HASIL DETAIL PER CABOR -->
        <section class="hasil-detail-section">
            <h2>Hasil Detail Per Cabor</h2>
            <div id="hasilDetail" class="hasil-detail-container">
                <!-- Di-generate dari data.js -->
            </div>
        </section>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Event Agustusan RT007 RW015. All rights reserved.</p>
            <a href="index.html">← Kembali ke Beranda</a>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
